<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#fbfbfc" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#08090c" media="(prefers-color-scheme: dark)" />
<title>kkAgentic Support</title>
<style>
  /* ===================== Modern-SaaS theme tokens ===================== */
  :root{
    --bg:#08090c; --grid:rgba(255,255,255,.022);
    --surface:#0c0d11; --surface-2:#15161b; --surface-3:#1c1e25;
    --ink:#e7e8ec; --muted:#8a8f98; --faint:#5d616a;
    --hair:rgba(255,255,255,.085); --line:rgba(255,255,255,.05);
    --accent:#7c74ff; --accent-press:#6a61f0; --accent-ink:#ffffff;
    --accent-soft:rgba(124,116,255,.14); --accent-line:rgba(124,116,255,.4);
    --ok:#3fb950; --bad:#f0533f;
    --glass:rgba(12,13,17,.8); --wall-dim:linear-gradient(180deg,rgba(8,9,12,.42),rgba(8,9,12,.72));
    --r:14px; --r-bubble:13px;
    --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --ease:cubic-bezier(.2,.7,.3,1);
  }
  @media(prefers-color-scheme:light){
    :root:not([data-theme="dark"]){
      --bg:#fbfbfc; --grid:rgba(0,0,0,.018);
      --surface:#ffffff; --surface-2:#f4f4f6; --surface-3:#ececef;
      --ink:#16171a; --muted:#60646c; --faint:#9095a0;
      --hair:rgba(0,0,0,.1); --line:rgba(0,0,0,.06);
      --accent:#6056e8; --accent-press:#4f45d8; --accent-ink:#ffffff;
      --accent-soft:rgba(96,86,232,.1); --accent-line:rgba(96,86,232,.35);
      --ok:#1a9c3a; --bad:#e0402c;
      --glass:rgba(255,255,255,.88); --wall-dim:linear-gradient(180deg,rgba(248,248,250,.8),rgba(248,248,250,.9));
    }
  }
  :root[data-theme="light"]{
    --bg:#fbfbfc; --grid:rgba(0,0,0,.018);
    --surface:#ffffff; --surface-2:#f4f4f6; --surface-3:#ececef;
    --ink:#16171a; --muted:#60646c; --faint:#9095a0;
    --hair:rgba(0,0,0,.1); --line:rgba(0,0,0,.06);
    --accent:#6056e8; --accent-press:#4f45d8; --accent-ink:#ffffff;
    --accent-soft:rgba(96,86,232,.1); --accent-line:rgba(96,86,232,.35);
    --ok:#1a9c3a; --bad:#e0402c;
    --glass:rgba(255,255,255,.88); --wall-dim:linear-gradient(180deg,rgba(248,248,250,.8),rgba(248,248,250,.9));
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.55;
    font-size:14px;letter-spacing:-.011em;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    display:flex;align-items:center;justify-content:center;padding:28px;position:relative;overflow:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(60% 36% at 50% -8%, var(--accent-soft), transparent 70%),
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 34px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/34px 100%;
    mask-image:radial-gradient(120% 90% at 50% 0%, #000 35%, transparent 78%)}
  /* faded agentic-AI wallpaper */
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:var(--wall-dim), url("bg-agentic.png") center/cover no-repeat fixed}
  @media(max-width:640px){body{padding:0}}

  /* ===================== App shell ===================== */
  .app{position:relative;z-index:1;width:100%;max-width:560px;height:min(880px,94vh);
    background:var(--glass);backdrop-filter:blur(26px) saturate(150%);-webkit-backdrop-filter:blur(26px) saturate(150%);
    border:1px solid var(--hair);border-radius:var(--r);
    box-shadow:0 1px 0 var(--line) inset, 0 30px 80px -30px rgba(0,0,0,.8);
    display:flex;flex-direction:column;overflow:hidden}
  @media(max-width:640px){.app{height:100dvh;max-width:none;border-radius:0;border:none}}

  /* header */
  header{display:flex;align-items:center;gap:9px;padding:0 12px;height:50px;flex:none;
    border-bottom:1px solid var(--line);background:transparent}
  .logo{width:24px;height:24px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;color:var(--accent-ink);
    background:linear-gradient(160deg,var(--accent),var(--accent-press));
    box-shadow:0 0 0 1px var(--accent-line), 0 4px 12px -4px var(--accent)}
  .brand{font-size:13.5px;font-weight:650;letter-spacing:-.02em}
  .brand .dim{color:var(--muted);font-weight:500}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
    font-weight:500;padding:3px 8px;border:1px solid var(--hair);border-radius:999px;margin-left:4px}
  .status .dot{width:6px;height:6px;border-radius:50%;background:var(--faint)}
  .status.online .dot{background:var(--ok);box-shadow:0 0 8px 0 var(--ok)}
  .status.offline .dot{background:var(--bad)}
  .sp{margin-left:auto}
  .gbtn{flex:none;height:30px;min-width:30px;padding:0 7px;border-radius:8px;border:1px solid var(--hair);
    background:var(--surface);color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;
    transition:.14s var(--ease);display:flex;align-items:center;justify-content:center;gap:5px}
  .gbtn:hover{background:var(--surface-2);color:var(--ink);border-color:var(--hair)}
  .gbtn:active{transform:translateY(.5px)}
  .gbtn.txt{font-size:12.5px;padding:0 11px}

  /* topic bar */
  .topic{display:none;align-items:center;gap:7px;padding:7px 14px;font-size:11px;font-weight:600;
    letter-spacing:.02em;color:var(--accent);background:var(--accent-soft);border-bottom:1px solid var(--line)}
  .topic.show{display:flex}
  .topic b{font-weight:700}
  .topic .x{margin-left:auto;cursor:pointer;color:var(--accent);opacity:.7;border:none;background:none;
    font-size:12px;line-height:1;padding:3px 5px;border-radius:6px}
  .topic .x:hover{opacity:1;background:rgba(124,116,255,.12)}

  /* messages */
  .messages{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:16px;
    scroll-behavior:smooth;position:relative;z-index:1}
  .messages::-webkit-scrollbar{width:9px}
  .messages::-webkit-scrollbar-thumb{background:var(--hair);border-radius:99px;border:2px solid var(--surface)}
  .pic{display:none}
  .row{display:flex;max-width:100%}
  .row.user{justify-content:flex-end}
  .row.bot{justify-content:flex-start}
  .bubble{max-width:84%;font-size:14px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;
    animation:rise .22s var(--ease)}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .row.user .bubble{background:var(--accent);color:var(--accent-ink);padding:9px 13px;border-radius:var(--r-bubble);
    border-bottom-right-radius:5px;box-shadow:0 6px 18px -10px var(--accent)}
  .row.bot .bubble{background:var(--surface-2);color:var(--ink);padding:11px 14px;border-radius:var(--r-bubble);
    border-bottom-left-radius:5px;border:1px solid var(--line)}
  .meta{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;color:var(--muted);
    margin-bottom:7px}
  .meta .who{color:var(--accent);font-weight:700;text-transform:uppercase}
  .sources{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line)}
  .src{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10.5px;color:var(--muted);
    background:var(--surface);border:1px solid var(--hair);border-radius:6px;padding:2px 8px}
  .src::before{content:"▸";color:var(--accent);font-size:9px}
  .picks{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
  .pick{font-size:12.5px;font-weight:600;color:var(--ink);background:var(--surface);border:1px solid var(--hair);
    border-radius:8px;padding:7px 13px;cursor:pointer;transition:.14s var(--ease)}
  .pick:hover{border-color:var(--accent-line);color:var(--accent);background:var(--accent-soft)}

  /* typing */
  .typing{display:inline-flex;gap:4px;padding:13px 15px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:var(--r-bubble);border-bottom-left-radius:5px;animation:rise .2s var(--ease)}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--faint);animation:blink 1.3s infinite}
  .typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

  /* welcome */
  .suggest{animation:rise .26s var(--ease)}
  .lbl{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;
    letter-spacing:.12em;margin:6px 2px 9px}
  .chips{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
  .chip{font-size:13.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);
    border-radius:9px;padding:10px 13px;cursor:pointer;transition:.15s var(--ease);text-align:left;line-height:1.4;
    display:flex;align-items:center;gap:9px}
  .chip::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--faint);flex:none;transition:.15s}
  .chip:hover{border-color:var(--accent-line);background:var(--surface-3);transform:translateX(2px)}
  .chip:hover::before{background:var(--accent);box-shadow:0 0 8px 0 var(--accent)}
  .chip.proj{flex-direction:column;align-items:flex-start;gap:3px}
  .chip.proj::before{display:none}
  .chip.proj .nm{font-weight:650}
  .chip.proj .d{font-weight:400;font-size:12px;color:var(--muted);line-height:1.4}
  .chip.proj:hover{color:var(--ink)}
  .chip.proj:hover .nm{color:var(--accent)}

  /* composer */
  .composer{padding:12px 12px calc(12px + env(safe-area-inset-bottom));flex:none;
    border-top:1px solid var(--line);background:transparent}
  form{display:flex;gap:8px;align-items:flex-end}
  .field{flex:1;background:var(--surface-2);border:1px solid var(--hair);border-radius:11px;
    padding:5px 6px 5px 13px;display:flex;align-items:flex-end;transition:.15s var(--ease)}
  .field:focus-within{border-color:var(--accent-line);box-shadow:0 0 0 3px var(--accent-soft);background:var(--surface)}
  textarea{flex:1;border:none;background:none;outline:none;resize:none;font:inherit;font-size:14px;color:var(--ink);
    max-height:130px;padding:7px 0;line-height:1.5}
  textarea::placeholder{color:var(--faint)}
  .send{flex:none;width:34px;height:34px;border-radius:8px;border:none;background:var(--accent);color:var(--accent-ink);
    font-size:15px;cursor:pointer;transition:.14s var(--ease);display:flex;align-items:center;justify-content:center}
  .send:hover:not(:disabled){background:var(--accent-press)}
  .send:active:not(:disabled){transform:translateY(.5px)}
  .send:disabled{opacity:.35;cursor:default}
  .foot{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:10px;
    font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.01em}
  .kbd{border:1px solid var(--hair);border-radius:5px;padding:1px 5px;color:var(--muted)}
  .foot a{color:var(--faint);text-decoration:none}
  .foot a:hover{color:var(--accent)}
  .foot .sepdot{opacity:.5}

  /* ===================== Attachments (screenshot / log upload) ===================== */
  .attach{flex:none;width:30px;height:30px;margin-right:2px;align-self:flex-end;margin-bottom:4px;
    border-radius:8px;border:none;background:none;color:var(--muted);font-size:16px;cursor:pointer;
    transition:.14s var(--ease);display:flex;align-items:center;justify-content:center}
  .attach:hover{background:var(--surface-3);color:var(--accent)}
  .attach-chip{display:none;align-items:center;gap:9px;margin:0 2px 9px;padding:7px 10px;
    background:var(--surface-2);border:1px solid var(--hair);border-radius:10px;font-size:12px}
  .attach-chip.show{display:flex}
  .attach-chip .thumb{width:30px;height:30px;border-radius:6px;object-fit:cover;flex:none;display:none;
    border:1px solid var(--hair)}
  .attach-chip .thumb.show{display:block}
  .attach-chip .ficon{width:30px;height:30px;border-radius:6px;flex:none;display:flex;align-items:center;
    justify-content:center;background:var(--surface-3);font-size:14px}
  .attach-chip .afn{font-weight:600;color:var(--ink);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .attach-chip .asz{color:var(--muted);font-family:var(--mono);font-size:10.5px}
  .attach-chip .ax{margin-left:auto;border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px;
    padding:3px 6px;border-radius:6px;line-height:1}
  .attach-chip .ax:hover{color:var(--ink);background:var(--surface-3)}
  .attach-err{display:none;color:var(--bad);font-size:11.5px;margin:0 4px 9px;font-weight:500}
  .attach-err.show{display:block}
  .bubble.att{display:flex;flex-direction:column;gap:8px;padding:9px}
  .att-img{max-width:230px;max-height:210px;border-radius:9px;display:block;border:1px solid rgba(255,255,255,.28)}
  .att-file{display:flex;align-items:center;gap:7px;font-size:12.5px}
  .att-nm{font-weight:600;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .att-sz{opacity:.78;font-family:var(--mono);font-size:10.5px}
  .att-cap{font-size:14px;line-height:1.55}
  .bubble.upl{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted)}
  .bubble.upl.ok{color:var(--ink)}
  .bubble.upl.err{color:var(--bad)}
  .upl-ic{font-weight:800}
  .bubble.upl.ok .upl-ic{color:var(--ok)}
  .upl-spin{width:14px;height:14px;border-radius:50%;border:2px solid var(--hair);border-top-color:var(--accent);
    animation:spin .7s linear infinite;flex:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===================== Onboarding guide (coach marks) ===================== */
  .coach{position:absolute;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity .3s}
  .coach.show{opacity:1}
  .coach-on{animation:coachPulse 1.5s var(--ease) infinite;position:relative;z-index:2}
  @keyframes coachPulse{
    0%{box-shadow:0 0 0 0 var(--accent-soft), 0 0 0 1px var(--accent-line)}
    60%{box-shadow:0 0 0 8px transparent, 0 0 0 1px var(--accent-line)}
    100%{box-shadow:0 0 0 0 transparent, 0 0 0 1px transparent}}
  .coach-hand{position:absolute;left:0;top:0;font-size:25px;opacity:0;pointer-events:none;
    transition:left .5s var(--ease),top .5s var(--ease),opacity .3s;
    filter:drop-shadow(0 4px 5px rgba(0,0,0,.35))}
  .coach-hand.hb-up{animation:hbup 1s ease-in-out infinite}
  .coach-hand.hb-left{animation:hbleft 1s ease-in-out infinite}
  @keyframes hbup{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
  @keyframes hbleft{0%,100%{transform:translateX(0)}50%{transform:translateX(7px)}}

  .coach-mascot{position:absolute;left:14px;bottom:82px;display:flex;flex-direction:column;align-items:flex-start;
    gap:9px;pointer-events:auto;cursor:pointer;max-width:78%}
  .coach.show .coach-mascot{animation:coachIn .42s var(--ease)}
  @keyframes coachIn{from{opacity:0;transform:translateY(14px) scale(.92)}to{opacity:1;transform:none}}
  .coach-bubble{position:relative;background:var(--surface-2);border:1px solid var(--hair);border-radius:12px;
    padding:11px 13px;font-size:12.5px;line-height:1.5;color:var(--ink);
    box-shadow:0 14px 34px -14px rgba(0,0,0,.55);max-width:240px}
  .coach-bubble::after{content:"";position:absolute;left:18px;bottom:-7px;width:12px;height:12px;
    background:var(--surface-2);border-right:1px solid var(--hair);border-bottom:1px solid var(--hair);
    transform:rotate(45deg)}
  .coach-ctl{display:flex;align-items:center;gap:10px;margin-top:10px}
  .coach-dots{display:flex;gap:5px;flex:1}
  .coach-dots i{width:6px;height:6px;border-radius:50%;background:var(--hair);transition:.2s}
  .coach-dots i.on{background:var(--accent);width:15px;border-radius:3px}
  .coach-skip{border:none;background:none;color:var(--muted);font:inherit;font-size:11.5px;font-weight:600;
    cursor:pointer;padding:2px 5px;border-radius:6px}
  .coach-skip:hover{color:var(--ink)}
  .mascot{position:relative;width:52px;height:52px;animation:bob 3s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .mascot-svg{width:52px;height:52px;display:block;overflow:visible;filter:drop-shadow(0 10px 16px rgba(106,97,240,.5))}
  .mascot-svg .eye{transform-box:fill-box;transform-origin:center;animation:blink 4.6s infinite}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.12)}}
  .mascot-svg .pupil{transform-box:fill-box;transform-origin:center;transition:transform .35s var(--ease)}
  .mascot-svg.look-left .pupil{transform:translateX(-1.8px)}
  .mascot-svg.look-up .pupil{transform:translateY(-1.7px)}
  .mascot-wave{position:absolute;right:-7px;bottom:3px;font-size:17px;transform-origin:70% 80%;
    animation:wave 3.4s ease-in-out infinite}
  @keyframes wave{0%,72%,100%{transform:rotate(0)}80%{transform:rotate(20deg)}90%{transform:rotate(-10deg)}}
  @media(max-width:640px){.coach-mascot{bottom:92px}}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="logo">k</span>
    <span class="brand">kkAgentic <span class="dim">Support</span></span>
    <span class="status" id="status"><span class="dot"></span><span id="status-text">Connecting…</span></span>
    <span class="sp"></span>
    <button class="gbtn" id="help-btn" title="How to use" aria-label="Show how to use">?</button>
    <button class="gbtn" id="theme-btn" title="Toggle appearance" aria-label="Toggle appearance">☾</button>
    <button class="gbtn txt" id="reset-btn" title="New conversation">New</button>
  </header>

  <div class="topic" id="topic">
    <span>TOPIC · <b id="topic-name"></b></span>
    <button class="x" id="topic-clear" title="Clear topic" aria-label="Clear topic">✕</button>
  </div>

  <div class="messages" id="messages" aria-live="polite"></div>

  <div class="composer">
    <div class="attach-err" id="attach-err"></div>
    <div class="attach-chip" id="attach-chip">
      <img class="thumb" id="attach-thumb" alt="attachment preview" />
      <span class="ficon" id="attach-ficon">📄</span>
      <span class="afn" id="attach-name"></span>
      <span class="asz" id="attach-size"></span>
      <button class="ax" id="attach-remove" type="button" aria-label="Remove attachment">✕</button>
    </div>
    <form id="form">
      <div class="field">
        <button class="attach" id="attach-btn" type="button" title="Attach a screenshot or log file" aria-label="Attach a file">📎</button>
        <textarea id="input" rows="1" placeholder="Message…  (or attach a screenshot / log)" autocomplete="off"></textarea>
      </div>
      <button class="send" id="send" type="submit" aria-label="Send">↑</button>
    </form>
    <input type="file" id="file-input" accept="image/*,.txt,.log,text/plain" hidden />
    <div class="foot">
      <span><span class="kbd">↵</span> send</span>
      <span class="sepdot">·</span>
      <a href="#" id="tg-link" target="_blank" rel="noopener">Telegram</a>
      <span class="sepdot">·</span>
      <a href="#" id="st-link" target="_blank" rel="noopener">Streamlit</a>
    </div>
  </div>

  <!-- Onboarding guide overlay -->
  <div class="coach" id="coach" aria-hidden="true">
    <div class="coach-hand" id="coach-hand">👆</div>
    <div class="coach-mascot" id="coach-mascot">
      <div class="coach-bubble">
        <span id="coach-text">Hi!</span>
        <div class="coach-ctl">
          <span class="coach-dots" id="coach-dots"></span>
          <button class="coach-skip" id="coach-skip" type="button">Skip</button>
        </div>
      </div>
      <div class="mascot">
        <svg viewBox="0 0 64 64" class="mascot-svg" id="mascot-svg" aria-hidden="true">
          <defs>
            <radialGradient id="mgrad" cx="34%" cy="28%" r="80%">
              <stop offset="0%" stop-color="#bdb7ff"/>
              <stop offset="45%" stop-color="#8b83ff"/>
              <stop offset="100%" stop-color="#6a61f0"/>
            </radialGradient>
          </defs>
          <line x1="32" y1="9" x2="32" y2="3.5" stroke="#8b83ff" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="32" cy="3" r="2.6" fill="#bdb7ff"/>
          <rect x="9" y="10" width="46" height="42" rx="15" fill="url(#mgrad)"/>
          <ellipse cx="24" cy="22" rx="12" ry="8" fill="#ffffff" opacity=".16"/>
          <g class="eyes">
            <rect class="eye" x="20" y="26" width="7" height="11" rx="3.5" fill="#fff"/>
            <rect class="eye" x="37" y="26" width="7" height="11" rx="3.5" fill="#fff"/>
            <circle class="pupil" cx="23.5" cy="32" r="2.2" fill="#3a2fb0"/>
            <circle class="pupil" cx="40.5" cy="32" r="2.2" fill="#3a2fb0"/>
          </g>
          <path class="smile" d="M25 42 Q32 47 39 42" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" opacity=".9"/>
        </svg>
        <span class="mascot-wave">👋</span>
      </div>
    </div>
  </div>
</div>

<script>
  // ====== CONFIG — edit for your deployment ======
  const API_BASE  = "http://localhost:8000";          // FastAPI base URL
  const TELEGRAM  = "https://t.me/your_bot_username";  // your Telegram bot link
  const STREAMLIT = "https://your-app.streamlit.app";  // your Streamlit console link
  // ===============================================

  const STARTERS = [
    "How do I download an invoice?",
    "What is your refund policy?",
    "How do I update my payment method?",
    "The app keeps crashing — what should I do?",
    "How do I turn on notifications?"
  ];
  const FALLBACK_PROJECTS = [
    { key: "billing-portal", name: "Billing Portal", description: "Invoices, payments, refunds, plans." },
    { key: "mobile-app",     name: "Mobile App",     description: "Login, sync, notifications, crashes." }
  ];

  const $ = (id) => document.getElementById(id);
  const messages = $("messages"), form = $("form"), input = $("input"), sendBtn = $("send");
  const statusEl = $("status"), statusText = $("status-text");
  const topicEl = $("topic"), topicName = $("topic-name"), themeBtn = $("theme-btn");

  $("tg-link").href = TELEGRAM;
  $("st-link").href = STREAMLIT;

  const sessionId = "web-" + Math.random().toString(36).slice(2, 10);
  let contextProject = null, contextProjectName = null;
  let projects = FALLBACK_PROJECTS.slice();
  let lastQuestion = "";
  let busy = false;
  let pendingFile = null;
  let uploadMaxMb = 10;
  let uploadAllowedExt = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".txt", ".log"];

  // ---------- theme (auto / light / dark) ----------
  const root = document.documentElement;
  const store = { get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
                  set(k,v){ try { localStorage.setItem(k,v); } catch(e){} } };
  const prefersDark = () => window.matchMedia("(prefers-color-scheme: dark)").matches;
  let theme = store.get("kk-theme") || "system"; // system | light | dark
  const isDark = () => theme === "dark" || (theme === "system" && prefersDark());
  function renderTheme(){
    if (theme === "system") root.removeAttribute("data-theme");
    else root.setAttribute("data-theme", theme);
    themeBtn.textContent = isDark() ? "☀" : "☾";
  }
  themeBtn.onclick = () => { theme = isDark() ? "light" : "dark"; store.set("kk-theme", theme); renderTheme(); };

  // ---------- helpers ----------
  function scrollDown(){ messages.scrollTop = messages.scrollHeight; }
  function esc(s){ const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

  function rowEl(who){
    const row = document.createElement("div");
    row.className = "row " + who;
    const pic = document.createElement("div"); pic.className = "pic"; row.appendChild(pic);
    return row;
  }

  function addUser(text){
    const row = rowEl("user");
    const b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
    row.appendChild(b); messages.appendChild(row); scrollDown();
  }

  function addBot(data){
    const row = rowEl("bot");
    const b = document.createElement("div"); b.className = "bubble";

    if (data.project_name && !data.needs_clarification) {
      const m = document.createElement("span"); m.className = "meta";
      m.innerHTML = `<span class="who">${esc(data.project_name)}</span> · ${Math.round((data.confidence || 0) * 100)}% match`;
      b.appendChild(m);
    }
    b.appendChild(document.createTextNode(data.answer || "(no answer)"));

    if (data.sources && data.sources.length) {
      const s = document.createElement("div"); s.className = "sources";
      data.sources.forEach(src => {
        const pill = document.createElement("span"); pill.className = "src"; pill.textContent = src;
        s.appendChild(pill);
      });
      b.appendChild(s);
    }

    if (data.needs_clarification && lastQuestion) {
      const picks = document.createElement("div"); picks.className = "picks";
      projects.forEach(p => {
        const btn = document.createElement("button"); btn.className = "pick"; btn.textContent = p.name;
        btn.onclick = () => { selectProject(p.key, p.name); send(lastQuestion); };
        picks.appendChild(btn);
      });
      b.appendChild(picks);
    }

    row.appendChild(b); messages.appendChild(row); scrollDown();
  }

  let typingRow = null;
  function setTyping(on){
    if (on) {
      if (typingRow) return;
      typingRow = rowEl("bot");
      const t = document.createElement("div"); t.className = "typing";
      t.innerHTML = "<span></span><span></span><span></span>";
      typingRow.appendChild(t); messages.appendChild(typingRow); scrollDown();
    } else if (typingRow) { typingRow.remove(); typingRow = null; }
  }

  function setStatus(state, text){ statusEl.className = "status " + state; statusText.textContent = text; }

  function selectProject(key, name){
    contextProject = key; contextProjectName = name;
    topicName.textContent = name; topicEl.classList.add("show");
  }
  $("topic-clear").onclick = () => {
    contextProject = null; contextProjectName = null; topicEl.classList.remove("show");
  };

  // ---------- welcome ----------
  function showWelcome(){
    messages.innerHTML = "";
    const greet = rowEl("bot");
    const gb = document.createElement("div"); gb.className = "bubble";
    gb.textContent = "Support assistant ready. Ask a question and I'll answer from your project docs — with sources. You can also attach a screenshot or a log file (📎) so our team can take a look. Pick a starting point below or just type.";
    greet.appendChild(gb); messages.appendChild(greet);

    const wrap = document.createElement("div"); wrap.className = "suggest";

    const ql = document.createElement("div"); ql.className = "lbl"; ql.textContent = "Suggested";
    wrap.appendChild(ql);
    const qchips = document.createElement("div"); qchips.className = "chips";
    STARTERS.forEach(q => {
      const c = document.createElement("button"); c.className = "chip"; c.textContent = q;
      c.onclick = () => send(q); qchips.appendChild(c);
    });
    wrap.appendChild(qchips);

    const pl = document.createElement("div"); pl.className = "lbl"; pl.textContent = "Topics";
    wrap.appendChild(pl);
    const pchips = document.createElement("div"); pchips.className = "chips";
    projects.forEach(p => {
      const c = document.createElement("button"); c.className = "chip proj";
      c.innerHTML = `<span class="nm">${esc(p.name)}</span>` + (p.description ? `<span class="d">${esc(p.description)}</span>` : "");
      c.onclick = () => { selectProject(p.key, p.name); input.focus(); };
      pchips.appendChild(c);
    });
    wrap.appendChild(pchips);
    messages.appendChild(wrap); scrollDown();
  }
  let welcomeShown = true;
  function clearWelcomeIfNeeded(){ if (welcomeShown) { messages.innerHTML = ""; welcomeShown = false; } }

  // ---------- attachments ----------
  function fmtSize(b){ return b < 1024 ? b + " B" : b < 1048576 ? Math.round(b / 1024) + " KB" : (b / 1048576).toFixed(1) + " MB"; }
  function flashAttachError(msg){
    const e = $("attach-err"); e.textContent = msg; e.classList.add("show");
    clearTimeout(flashAttachError._t); flashAttachError._t = setTimeout(() => e.classList.remove("show"), 4500);
  }
  function pickFile(file){
    const ext = "." + (file.name.split(".").pop() || "").toLowerCase();
    if (uploadAllowedExt.length && uploadAllowedExt.indexOf(ext) < 0){
      flashAttachError("Please attach an image (PNG/JPG…) or a .txt / .log file."); return;
    }
    if (file.size > uploadMaxMb * 1024 * 1024){
      flashAttachError("That file is too large — the limit is " + uploadMaxMb + " MB."); return;
    }
    pendingFile = file; showAttachment(file); input.focus();
  }
  function showAttachment(file){
    const thumb = $("attach-thumb"), ficon = $("attach-ficon");
    if (file.type.indexOf("image/") === 0){
      thumb.src = URL.createObjectURL(file); thumb.classList.add("show"); ficon.style.display = "none";
    } else {
      thumb.classList.remove("show"); thumb.removeAttribute("src"); ficon.style.display = "flex"; ficon.textContent = "📄";
    }
    $("attach-name").textContent = file.name;
    $("attach-size").textContent = fmtSize(file.size);
    $("attach-chip").classList.add("show");
    $("attach-err").classList.remove("show");
  }
  function clearAttachment(){
    pendingFile = null; $("file-input").value = ""; $("attach-chip").classList.remove("show");
  }
  function addUserAttachment(file, caption){
    const row = rowEl("user");
    const b = document.createElement("div"); b.className = "bubble att";
    if (file.type.indexOf("image/") === 0){
      const img = document.createElement("img"); img.className = "att-img"; img.src = URL.createObjectURL(file); b.appendChild(img);
    }
    const fr = document.createElement("div"); fr.className = "att-file";
    fr.innerHTML = `📎 <span class="att-nm">${esc(file.name)}</span><span class="att-sz">${fmtSize(file.size)}</span>`;
    b.appendChild(fr);
    if (caption){ const c = document.createElement("div"); c.className = "att-cap"; c.textContent = caption; b.appendChild(c); }
    row.appendChild(b); messages.appendChild(row); scrollDown();
  }
  function addUploading(file){
    const row = rowEl("bot");
    const b = document.createElement("div"); b.className = "bubble upl";
    b.innerHTML = `<span class="upl-spin"></span><span class="upl-tx">Sending “${esc(file.name)}” to our team…</span>`;
    row.appendChild(b); messages.appendChild(row); scrollDown();
    return {
      done(data){ b.classList.add("ok");
        b.innerHTML = `<span class="upl-ic">✓</span><span class="upl-tx">Got it — “${esc((data && data.name) || file.name)}” was shared with our support team.</span>`;
        scrollDown(); },
      fail(msg){ b.classList.add("err");
        b.innerHTML = `<span class="upl-ic">!</span><span class="upl-tx">${esc(msg)}</span>`; scrollDown(); }
    };
  }
  async function uploadFile(file, note){
    const ui = addUploading(file);
    try {
      const fd = new FormData();
      fd.append("file", file); fd.append("session_id", sessionId); fd.append("note", note || "");
      const r = await fetch(API_BASE + "/upload", { method: "POST", body: fd });
      let data = {}; try { data = await r.json(); } catch (e) {}
      if (r.ok && data.ok){ ui.done(data); setStatus("online", "Online"); }
      else { ui.fail((data && data.detail) || ("Upload failed (" + r.status + ").")); }
    } catch (e) {
      setStatus("offline", "Can't reach backend");
      ui.fail("Couldn't reach the upload service. Please try again, or contact us on Telegram.");
    }
  }

  // ---------- chat + send ----------
  async function askChat(question){
    lastQuestion = question; setTyping(true);
    try {
      const r = await fetch(API_BASE + "/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, session_id: sessionId, project_key: contextProject })
      });
      const data = await r.json();
      setTyping(false);
      if (data.project_key) selectProject(data.project_key, data.project_name);
      setStatus("online", "Online");
      addBot(data);
    } catch (err) {
      setTyping(false);
      setStatus("offline", "Can't reach backend");
      addBot({ answer: "I couldn't reach the support service right now. Please try again in a moment — or reach us on Telegram.",
        needs_clarification: false, sources: [] });
    }
  }
  async function send(question){
    question = (question || "").trim();
    const file = pendingFile;
    if ((!question && !file) || busy) return;
    endTour(); clearWelcomeIfNeeded();
    busy = true; sendBtn.disabled = true;
    if (file){ addUserAttachment(file, question); clearAttachment(); }
    else { addUser(question); }
    input.value = ""; autoGrow();
    if (file) await uploadFile(file, question);
    if (question) await askChat(question);
    busy = false; sendBtn.disabled = false; input.focus();
  }

  // ---------- backend probes ----------
  async function checkHealth(){
    try { const r = await fetch(API_BASE + "/health", { cache: "no-store" });
      if (r.ok) { setStatus("online", "Online"); return true; } } catch (e) {}
    setStatus("offline", "Offline — start the API"); return false;
  }
  async function loadProjects(){
    try {
      const r = await fetch(API_BASE + "/projects");
      if (!r.ok) return;
      const data = await r.json();
      if (data.projects && data.projects.length) {
        projects = data.projects;
        if (welcomeShown) showWelcome();
        if (tourActive) showStep(stepIdx);
      }
    } catch (e) {}
  }
  async function loadUploadInfo(){
    try {
      const r = await fetch(API_BASE + "/upload-info");
      if (!r.ok) return;
      const d = await r.json();
      if (d.max_mb) uploadMaxMb = d.max_mb;
      if (d.allowed_ext && d.allowed_ext.length){
        uploadAllowedExt = d.allowed_ext.map(x => x.toLowerCase());
        $("file-input").setAttribute("accept", uploadAllowedExt.join(","));
      }
    } catch (e) {}
  }

  // ---------- composer behavior ----------
  function autoGrow(){ input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 130) + "px"; }
  input.addEventListener("input", () => { autoGrow(); if (input.value.trim()) endTour(); });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(input.value); }
  });
  form.addEventListener("submit", (e) => { e.preventDefault(); send(input.value); });

  // attach controls
  const fileInput = $("file-input");
  $("attach-btn").onclick = () => fileInput.click();
  fileInput.addEventListener("change", () => { const f = fileInput.files && fileInput.files[0]; if (f) pickFile(f); });
  $("attach-remove").onclick = () => clearAttachment();

  $("reset-btn").onclick = () => {
    contextProject = null; contextProjectName = null; lastQuestion = "";
    topicEl.classList.remove("show"); clearAttachment(); welcomeShown = true; showWelcome(); input.focus();
  };
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => { if (theme === "system") renderTheme(); });

  // ---------- onboarding guide (coach marks) ----------
  const app = document.querySelector(".app");
  const coach = $("coach"), coachHand = $("coach-hand"), coachText = $("coach-text"),
        coachDots = $("coach-dots"), mascotSvg = $("mascot-svg");
  let tourActive = false, stepIdx = 0, tourTimer = null;

  const TOUR = [
    { text: "Hi! 👋 I'm your helper. Here's how to use this in a few quick steps." },
    { sel: ".chip", dir: "left", text: "Tap a ready-made question to ask it right away." },
    { sel: "#input", dir: "left", text: "…or just type your own question here, in plain words." },
    { sel: "#send", dir: "up", text: "Then press Send — I'll find the answer in your docs and show the sources." },
    { text: "That's it! Ask me anything. Tap “?” at the top to see this again. 🙂" }
  ];

  function clearPulse(){ document.querySelectorAll(".coach-on").forEach(e => e.classList.remove("coach-on")); }
  function renderDots(){
    coachDots.innerHTML = "";
    TOUR.forEach((_, i) => { const d = document.createElement("i"); if (i === stepIdx) d.className = "on"; coachDots.appendChild(d); });
  }
  function pointAt(el, dir){
    const a = app.getBoundingClientRect(), t = el.getBoundingClientRect();
    coachHand.classList.remove("hb-up", "hb-left");
    let x, y;
    if (dir === "up") {
      coachHand.textContent = "👆";
      x = t.left - a.left + t.width / 2 - 12; y = t.bottom - a.top + 4;
      coachHand.classList.add("hb-up"); mascotSvg.setAttribute("class", "mascot-svg look-up");
    } else {
      coachHand.textContent = "👈";
      x = t.right - a.left + 6; y = t.top - a.top + t.height / 2 - 14;
      coachHand.classList.add("hb-left"); mascotSvg.setAttribute("class", "mascot-svg look-left");
    }
    coachHand.style.left = x + "px"; coachHand.style.top = y + "px"; coachHand.style.opacity = "1";
  }
  function showStep(i){
    stepIdx = i;
    if (i >= TOUR.length) { endTour(); return; }
    const s = TOUR[i];
    coachText.textContent = s.text; renderDots(); clearPulse();
    if (s.sel) {
      const el = document.querySelector(s.sel);
      if (el) { el.classList.add("coach-on"); pointAt(el, s.dir); }
      else { coachHand.style.opacity = "0"; }
    } else {
      coachHand.style.opacity = "0"; mascotSvg.setAttribute("class", "mascot-svg");
    }
    clearTimeout(tourTimer);
    tourTimer = setTimeout(() => showStep(i + 1), s.sel ? 3600 : 3000);
  }
  function startTour(){
    if (!welcomeShown) showWelcome();
    tourActive = true; coach.classList.add("show"); coach.setAttribute("aria-hidden", "false");
    showStep(0);
  }
  function endTour(){
    if (!tourActive) return;
    tourActive = false; clearTimeout(tourTimer); clearPulse();
    coach.classList.remove("show"); coach.setAttribute("aria-hidden", "true");
    coachHand.style.opacity = "0"; mascotSvg.setAttribute("class", "mascot-svg");
  }
  $("coach-skip").onclick = (e) => { e.stopPropagation(); endTour(); };
  $("coach-mascot").onclick = () => { if (tourActive) showStep(stepIdx + 1); };
  $("help-btn").onclick = () => startTour();
  window.addEventListener("resize", () => { if (tourActive) showStep(stepIdx); });

  // ---------- boot ----------
  renderTheme();
  showWelcome();
  checkHealth();
  loadProjects();
  loadUploadInfo();
  input.focus();
  startTour();
</script>
</body>
</html>
