# Streamlit theme — professional Apple-style LIGHT theme so the native intake
# section (captions, expander, chat input, file uploader, buttons) matches the
# light marketing page instead of the old dark look.
#
# Streamlit Community Cloud reads this file automatically.

[theme]
base = "light"
primaryColor = "#0071e3"             # Apple blue accent (buttons, focus)
backgroundColor = "#ffffff"           # main page background
secondaryBackgroundColor = "#f5f5f7"  # widget surfaces: uploader, expander, chat input
textColor = "#1d1d1f"                 # Apple near-black text
font = "sans serif"
