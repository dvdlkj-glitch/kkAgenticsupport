# Streamlit theme — premium dark SaaS theme so the native intake section
# (captions, expander, chat input, file uploader, buttons) matches the dark
# marketing hero rendered above it.
#
# Streamlit Community Cloud reads this file automatically.

[theme]
base = "dark"
primaryColor = "#7f78ff"              # violet accent (buttons, focus, links)
backgroundColor = "#090a0f"           # main page background (matches hero --bg)
secondaryBackgroundColor = "#161922"  # widget surfaces: uploader, expander, chat input
textColor = "#edeef3"                 # crisp near-white text
font = "sans serif"
